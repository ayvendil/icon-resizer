<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: Inter, sans-serif; }
  body { background: #1e1e1e; color: #fff; padding: 16px; overflow-x: hidden; }

  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .header-title { font-size: 13px; font-weight: 600; color: #fff; }
  .icon-btn {
    background: none; border: none; cursor: pointer; padding: 4px;
    color: #666; border-radius: 6px; transition: background .15s, color .15s;
    display: flex; align-items: center;
  }
  .icon-btn:hover { background: #2c2c2c; color: #fff; }
  .icon-btn.active { color: #7b61ff; }

  .section-title {
    font-size: 10px; font-weight: 600; color: #666;
    letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px;
  }
  .divider { border: none; border-top: 1px solid #333; margin: 14px 0; }

  .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  label { font-size: 13px; color: #ccc; }

  select {
    background: #2c2c2c; color: #fff; border: 1.5px solid #444;
    border-radius: 6px; padding: 6px 10px; font-size: 13px; cursor: pointer;
    outline: none; min-width: 130px;
  }
  select:focus { border-color: #7b61ff; }

  .info-box {
    background: #2c2c2c; border-radius: 8px; padding: 10px 14px;
    margin-bottom: 10px; display: flex; justify-content: space-between;
  }
  .info-item { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .info-val { font-size: 16px; font-weight: 700; color: #7b61ff; }
  .info-lbl { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: .05em; }

  .btn {
    width: 100%; padding: 10px; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s;
    margin-bottom: 8px;
  }
  .btn-primary { background: #7b61ff; color: #fff; }
  .btn-primary:hover { background: #6a50ee; }
  .btn-secondary { background: #2c2c2c; color: #ccc; border: 1.5px solid #444; }
  .btn-secondary:hover { background: #383838; }

  .all-sizes { background: #2c2c2c; border-radius: 8px; padding: 10px 12px; }
  .size-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 0; font-size: 12px; color: #aaa;
    border-bottom: 1px solid #333;
  }
  .size-row:last-child { border-bottom: none; }
  .size-name { color: #fff; font-weight: 500; width: 80px; }
  .size-badge { color: #7b61ff; }

  .msg { margin-top: 10px; font-size: 12px; text-align: center; min-height: 16px; }
  .msg.error { color: #ff6b6b; }
  .msg.success { color: #6bffa0; }

  /* ── Settings panel ── */
  #settingsPanel {
    display: none; position: fixed; inset: 0;
    background: #1e1e1e; padding: 16px; overflow-y: auto; z-index: 10;
  }
  #settingsPanel.open { display: block; }

  .settings-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
  }
  .settings-header span { font-size: 13px; font-weight: 600; }

  .settings-table { width: 100%; border-collapse: collapse; }
  .settings-table thead th {
    font-size: 10px; color: #666; text-transform: uppercase;
    letter-spacing: .07em; padding: 0 4px 8px; text-align: left; font-weight: 600;
  }
  .settings-table tbody tr { border-bottom: 1px solid #2a2a2a; }
  .settings-table tbody tr:last-child { border-bottom: none; }
  .settings-table td { padding: 5px 4px; }

  .tbl-input {
    width: 100%; background: #2c2c2c; border: 1.5px solid transparent;
    border-radius: 5px; color: #fff; font-size: 12px; padding: 4px 6px;
    outline: none; transition: border-color .15s;
  }
  .tbl-input:focus { border-color: #7b61ff; }
  .tbl-input.invalid { border-color: #ff6b6b; }

  .settings-actions { display: flex; gap: 8px; margin-top: 14px; }
  .settings-actions .btn { margin-bottom: 0; }
  .btn-danger { background: #3a1f1f; color: #ff6b6b; border: 1.5px solid #5a2a2a; }
  .btn-danger:hover { background: #4a2525; }
</style>
</head>
<body>

<!-- ── Main panel ── -->
<div id="mainPanel">
  <div class="header">
    <span class="header-title">Icon Resizer</span>
    <button class="icon-btn" id="settingsBtn" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <div class="section-title">Single size</div>
  <div class="row">
    <label>Icon size</label>
    <select id="sizeSelect"></select>
  </div>
  <div class="info-box">
    <div class="info-item">
      <span class="info-val" id="previewSize">—</span>
      <span class="info-lbl">Size px</span>
    </div>
    <div class="info-item">
      <span class="info-val" id="previewStroke">—</span>
      <span class="info-lbl">Stroke px</span>
    </div>
    <div class="info-item">
      <span class="info-val" id="previewLabel">—</span>
      <span class="info-lbl">Title</span>
    </div>
  </div>
  <button class="btn btn-secondary" id="applyBtn">Apply to selected</button>

  <hr class="divider">

  <div class="section-title">All sizes at once</div>
  <div class="all-sizes" id="allSizesList"></div>
  <button class="btn btn-primary" id="generateBtn" style="margin-top:10px">Generate all sizes →</button>

  <hr class="divider">

  <div class="section-title">Finalize</div>
  <button class="btn btn-secondary" id="detachBtn">Detach & Make Components</button>
  <button class="btn btn-secondary" id="prefixBtn">Add Prefix by Size</button>

  <div class="msg" id="msg"></div>
</div>

<!-- ── Settings panel ── -->
<div id="settingsPanel">
  <div class="settings-header">
    <span>⚙ Settings</span>
    <button class="icon-btn" id="closeSettings" title="Back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <table class="settings-table">
    <thead>
      <tr>
        <th>Title</th>
        <th>Size px</th>
        <th>Stroke px</th>
        <th>Prefix</th>
      </tr>
    </thead>
    <tbody id="settingsBody"></tbody>
  </table>

  <div class="settings-actions">
    <button class="btn btn-danger" id="resetBtn">Reset defaults</button>
    <button class="btn btn-primary" id="saveBtn">Save</button>
  </div>
  <div class="msg" id="settingsMsg"></div>
</div>

<script>
const DEFAULTS = [
  { label: "Caption",   size: 12, stroke: 1.0, prefix: "12/" },
  { label: "Body",      size: 16, stroke: 1.5, prefix: "16/" },
  { label: "Title S",   size: 20, stroke: 1.8, prefix: "20/" },
  { label: "Title M",   size: 24, stroke: 2.5, prefix: "24/" },
  { label: "Title L",   size: 32, stroke: 2.8, prefix: "32/" },
  { label: "Title XL",  size: 40, stroke: 3.2, prefix: "40/" },
  { label: "Title XXL", size: 48, stroke: 4.5, prefix: "48/" },
  { label: "Title 4XL", size: 56, stroke: 5.2, prefix: "56/" },
];

let presets = DEFAULTS.map(p => ({...p}));

function savePresets(data) {
  // Сохранение через code.js → figma.clientStorage
  parent.postMessage({ pluginMessage: { type: "save-presets", presets: data } }, "*");
}

// ── Build main UI ──
function buildMain() {
  const sel = document.getElementById("sizeSelect");
  sel.innerHTML = presets.map((p, i) =>
    `<option value="${i}">${p.size}px — ${p.label}</option>`
  ).join("");

  const list = document.getElementById("allSizesList");
  list.innerHTML = presets.map(p => `
    <div class="size-row">
      <span class="size-name">${p.label}</span>
      <span>${p.size}px</span>
      <span class="size-badge">${p.stroke}px</span>
    </div>`).join("");

  updatePreview();
}

function updatePreview() {
  const i = Number(document.getElementById("sizeSelect").value);
  const p = presets[i];
  if (!p) return;
  document.getElementById("previewSize").textContent   = p.size;
  document.getElementById("previewStroke").textContent = p.stroke;
  document.getElementById("previewLabel").textContent  = p.label;
  document.getElementById("msg").textContent = "";
  document.getElementById("msg").className = "msg";
}

document.getElementById("sizeSelect").addEventListener("change", updatePreview);

document.getElementById("applyBtn").addEventListener("click", () => {
  const i = Number(document.getElementById("sizeSelect").value);
  const p = presets[i];
  parent.postMessage({ pluginMessage: { type: "apply", size: p.size, stroke: p.stroke } }, "*");
});

document.getElementById("generateBtn").addEventListener("click", () => {
  parent.postMessage({ pluginMessage: { type: "generate-all", presets } }, "*");
});

// ── Settings ──
document.getElementById("settingsBtn").addEventListener("click", openSettings);
document.getElementById("closeSettings").addEventListener("click", closeSettings);

function openSettings() {
  document.getElementById("settingsPanel").classList.add("open");
  document.getElementById("settingsBtn").classList.add("active");
  buildSettingsTable(presets);
}

function closeSettings() {
  document.getElementById("settingsPanel").classList.remove("open");
  document.getElementById("settingsBtn").classList.remove("active");
}

function buildSettingsTable(data) {
  const tbody = document.getElementById("settingsBody");
  tbody.innerHTML = data.map((p, i) => `
    <tr>
      <td><input class="tbl-input" data-i="${i}" data-key="label"  value="${p.label}"></td>
      <td><input class="tbl-input" data-i="${i}" data-key="size"   value="${p.size}"   type="number" min="1"></td>
      <td><input class="tbl-input" data-i="${i}" data-key="stroke" value="${p.stroke}" type="number" min="0.1" step="0.1"></td>
      <td><input class="tbl-input" data-i="${i}" data-key="prefix" value="${p.prefix ?? p.size + '/'}"></td>
    </tr>`).join("");
}

document.getElementById("saveBtn").addEventListener("click", () => {
  const inputs = document.querySelectorAll(".tbl-input");
  const draft = presets.map(p => ({...p}));
  let valid = true;

  inputs.forEach(inp => {
    const i = Number(inp.dataset.i), key = inp.dataset.key;
    const val = key === "label" ? inp.value.trim() : Number(inp.value);
    if (key !== "label" && (isNaN(val) || val <= 0)) {
      inp.classList.add("invalid"); valid = false;
    } else {
      inp.classList.remove("invalid");
      draft[i][key] = val;
    }
  });

  if (!valid) {
    const m = document.getElementById("settingsMsg");
    m.textContent = "Fix invalid values first"; m.className = "msg error"; return;
  }

  presets = draft;
  savePresets(presets);
  buildMain();

  const m = document.getElementById("settingsMsg");
  m.textContent = "✓ Saved!"; m.className = "msg success";
  setTimeout(() => closeSettings(), 800);
});

document.getElementById("resetBtn").addEventListener("click", () => {
  parent.postMessage({ pluginMessage: { type: "reset-presets" } }, "*");
  const m = document.getElementById("settingsMsg");
  m.textContent = "Defaults restored"; m.className = "msg success";
  setTimeout(() => closeSettings(), 800);
});

// ── Messages from plugin ──
document.getElementById("detachBtn").addEventListener("click", () => {
  parent.postMessage({ pluginMessage: { type: "detach-and-make-components" } }, "*");
});

document.getElementById("prefixBtn").addEventListener("click", () => {
  parent.postMessage({ pluginMessage: { type: "add-prefix", presets } }, "*");
});

window.onmessage = (e) => {
  const m = e.data.pluginMessage;
  if (!m) return;
  if (m.type === "init") {
    presets = m.presets;
    buildMain();
    closeSettings();
  } else if (m.type === "presets-saved") {
    buildMain();
    const sm = document.getElementById("settingsMsg");
    sm.textContent = "✓ Saved!"; sm.className = "msg success";
    setTimeout(() => closeSettings(), 800);
  } else {
    const el = document.getElementById("msg");
    el.textContent = m.text;
    el.className = "msg " + m.type;
  }
};

buildMain();
</script>
</body>
</html>
